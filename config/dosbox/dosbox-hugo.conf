# dosbox-hugo.conf — Config DOSBox (clásico) para Hugo en Raspberry Pi 4
#
# Se invoca con:
#   dosbox -conf /opt/hugo-phone/games/dosbox-hugo.conf
#
# Optimizado para correr Hugo 4 (CD-ROM ISO) en pantalla completa por HDMI a TV.

[sdl]
fullscreen           = true
fulldouble           = false
fullresolution       = original
windowresolution     = original
output               = opengl
autolock             = true
sensitivity          = 100
waitonerror          = true
priority             = higher,normal
usescancodes         = true

[render]
frameskip            = 0
aspect               = true
scaler               = none

[cpu]
core                 = dynamic        ; importante en ARM
cputype              = auto
cycles               = fixed 8000     ; ajustar si Hugo va muy rápido/lento
cycleup              = 10
cycledown            = 20

[mixer]
nosound              = false
rate                 = 44100
blocksize            = 1024
prebuffer            = 25

[midi]
mpu401               = intelligent
mididevice           = none

[sblaster]
sbtype               = sb16
sbbase               = 220
irq                  = 7
dma                  = 1
hdma                 = 5
sbmixer              = true
oplmode              = auto
oplemu               = default
oplrate              = 44100

[joystick]
joysticktype         = none
timed                = false

[autoexec]
# Monta /opt/hugo-phone/games como C: y el ISO de Hugo 4 como D:.
# El instalador del juego habrá copiado HUGO.EXE a C:\HUGO\ la primera vez.
# Si el juego pide CD, dejar la línea imgmount; si arranca sin CD, se puede
# comentar para acelerar el boot.
mount c /opt/hugo-phone/games
imgmount d /opt/hugo-phone/games/hugo4.iso -t iso
c:
cd HUGO
HUGO.EXE
exit
