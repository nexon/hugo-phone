# dosbox-hugo.conf — Config DOSBox-Staging para Hugo en Raspberry Pi 4
# Ubicar en: ~/.config/dosbox/dosbox-staging.conf
#
# Optimizado para correr Hugo en pantalla completa por HDMI a TV.

[sdl]
fullscreen           = true
display_res          = desktop
fullresolution       = desktop
windowresolution     = 800x600
output               = opengl
texture_renderer     = auto
capture_mouse        = onclick
priority             = higher,normal
mouse_capture        = onclick

[render]
frameskip            = 0
aspect               = true
integer_scaling      = vertical
glshader             = sharp

[cpu]
core                 = dynamic        ; importante en ARM, mejor performance
cputype              = 486_slow
cycles               = fixed 8000     ; ajustar si el juego va muy rápido/lento
cycleup              = 10
cycledown            = 20

[mixer]
nosound              = false
rate                 = 44100
blocksize            = 1024
prebuffer            = 25

[midi]
mididevice           = none

[sblaster]
sbtype               = sb16
sbbase               = 220
irq                  = 7
dma                  = 1
hdma                 = 5
mixer                = true
oplmode              = auto
oplrate              = 44100

[joystick]
joysticktype         = none
timed                = false

[autoexec]
# Monta el directorio con Hugo y lánzalo.
# Asume que descomprimiste el juego en /opt/hugo-phone/games/hugo/
mount c /opt/hugo-phone/games
c:
cd hugo
hugo.exe
exit
