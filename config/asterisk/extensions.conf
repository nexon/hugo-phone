; /etc/asterisk/extensions.conf
; Hugo Phone — Dialplan
;
; Cuando un teléfono se descuelga (HT801) o un softphone llama al 9000,
; entra a la app "HugoGame" que mantiene la llamada abierta indefinidamente.
; Cada DTMF presionado dispara un evento AMI que el bridge Python convierte
; a una tecla del teclado en DOSBox.

[hugo-default]
exten => _X.,1,Hangup()

[hugo-game]
; ============================================================
; Hot-line: cualquier descolgado del HT801 entra aquí.
; Configurar el HT801 con dial plan "S0<9000>" para auto-dial al 9000.
; ============================================================
exten => 9000,1,NoOp(Hugo Phone — Llamada entrante de ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(beep)
 ; Bucle infinito leyendo DTMF.
 ; Cada tecla dispara un evento UserEvent que el bridge captura por AMI.
 same => n(loop),Read(TECLA,,1,,,3600)
 same => n,GotoIf($["${TECLA}" = ""]?loop)
 same => n,UserEvent(HugoKey,Channel: ${CHANNEL},Caller: ${CALLERID(num)},Key: ${TECLA})
 same => n,Goto(loop)

exten => h,1,NoOp(Llamada Hugo finalizada)
