; /etc/asterisk/sip.conf
; Hugo Phone — Configuración SIP
;
; Extensiones:
;   101  → Teléfono real vía HT801 (puerto FXS único)
;   102  → Softphone para testing (Linphone, Zoiper)

[general]
context=hugo-default
allowoverlap=no
udpbindaddr=0.0.0.0:5060
tcpenable=no
transport=udp
srvlookup=no
disallow=all
allow=ulaw
allow=alaw
language=es
dtmfmode=rfc2833       ; DTMF "out-of-band" estándar y confiable
qualify=yes
nat=no
canreinvite=no
session-timers=refuse
alwaysauthreject=yes

; ============================================================
; 101 — HT801 (teléfono físico)
; ============================================================
[101]
type=friend
host=dynamic
secret=cambiame-101    ; CAMBIAR antes de producción
context=hugo-game
callerid="Telefono Hugo 1" <101>
dtmfmode=rfc2833
qualify=yes

; ============================================================
; 102 — Softphone testing (Linphone en celular/PC)
; ============================================================
[102]
type=friend
host=dynamic
secret=cambiame-102    ; CAMBIAR antes de producción
context=hugo-game
callerid="Softphone Test" <102>
dtmfmode=rfc2833
qualify=yes
