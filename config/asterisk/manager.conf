; /etc/asterisk/manager.conf
; Hugo Phone — AMI (Asterisk Manager Interface)
;
; El bridge Python se conecta aquí, escucha eventos UserEvent(HugoKey,...)
; y los traduce a teclas del sistema.

[general]
enabled = yes
port = 5038
bindaddr = 127.0.0.1    ; Solo local: el bridge corre en la misma Pi

[hugo-bridge]
secret = cambiame-ami       ; CAMBIAR
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.255
read = user,call            ; UserEvent + eventos de llamada
write = user,call,system    ; Por si queremos originar llamadas o reproducir audio
