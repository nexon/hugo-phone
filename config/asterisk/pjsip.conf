; /etc/asterisk/pjsip.conf
; Hugo Phone — Configuración PJSIP (Asterisk 22)

; ============================================================
; CONFIGURACIÓN GLOBAL Y TRANSPORTES
; ============================================================

[system]
type=system

[global]
type=global
user_agent=Hugo PBX

; Configuración del transporte UDP (reemplaza udpbindaddr y transport=udp)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ============================================================
; CONFIGURACIÓN DE PLANTILLA (Para evitar repetir código)
; ============================================================
[endpoint-template](!)
type=endpoint
transport=transport-udp
context=hugo-game          ; Tu contexto en extensions.conf
disallow=all
allow=ulaw
allow=alaw
language=es
dtmf_mode=rfc4733          ; dtmfmode=rfc4733
direct_media=no            ; canreinvite=no
timers=no              ; session-timers=no

; ============================================================
; EXTENSIÓN 101 — HT801 (teléfono físico)
; ============================================================

[101](endpoint-template)
auth=auth101
aors=101
callerid="Telefono Hugo 1" <101>

[auth101]
type=auth
auth_type=userpass
username=101
password=cambiame-101      ; Tu secret del archivo anterior

[101]
type=aor
max_contacts=1             ; Equivalente a host=dynamic exclusivo para un dispositivo
qualify_frequency=60       ; qualify=yes (revisa el estado cada 60 segundos)


; ============================================================
; EXTENSIÓN 102 — Softphone testing (Linphone en celular/PC)
; ============================================================

[102](endpoint-template)
auth=auth102
aors=102
callerid="Softphone Test" <102>

[auth102]
type=auth
auth_type=userpass
username=102
password=cambiame-102      ; Tu secret del archivo anterior

[102]
type=aor
max_contacts=1             ; host=dynamic
qualify_frequency=60       ; qualify=yes
